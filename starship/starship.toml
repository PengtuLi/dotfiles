# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "catppuccin_macchiato"

format = """
[¯éÂ](red)\
$os\
$username\
[¯é░](bg:peach fg:red)\
$directory\
[¯é░](bg:yellow fg:peach)\
$git_branch\
$git_status\
[¯é░](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:green bg:sapphire)\
$conda\
[¯é░](fg:sapphire bg:lavender)\
$time\
[¯é┤ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

# Starship modules
[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[[¾░äø](green) ÔØ»](peach)"
error_symbol = "[[¾░äø](red) ÔØ»](peach)"
vimcmd_symbol = "[¾░äø ÔØ«](subtext1)" # For use with zsh-vi-mode

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ ´É║ $time ](fg:crust bg:lavender)]($style)'

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

