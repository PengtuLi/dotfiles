# 预设组件映射（Bash associative array）
declare -A MAIN_PRESET_COMPONENTS=(
    [osx]="conda,prerequisites,stow,shell_scripts,extras,brew_bundle"
    [linux-gui]="conda,prerequisites,stow,shell_scripts,extras,brew_bundle,mesh"
    [linux-headless]="prerequisites,stow,shell_scripts,brew_bundle"
)

declare -A BREW_BUNDLE_PRESET_COMPONENTS=(
    [osx]="Brewfile.osx"
    [linux-gui]="Brewfile.linux-gui"
    [linux-headless]="Brewfile.linux-container"
)

# 支持的预设列表（可选，也可在主脚本中保留）
SUPPORTED_PRESETS=("osx" "linux-gui" "linux-headless")
