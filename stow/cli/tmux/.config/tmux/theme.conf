# 状态栏背景/前景色
set -g status-style "bg=#000000,fg=#ffffff"

# 当前窗口状态样式（使用真彩色或 256 色）
set -g window-status-current-style "bg=#585858,fg=#ffff00"  # 黄色文字，深灰背景

set -g window-status-separator ""
# 窗口状态基本样式（非当前窗口）
set -g window-status-format " #I:#W "
# 当前窗口高亮（加粗 + 背景色）
set -g window-status-current-format " #[bold]#I:#W#[nobold] "

# 状态栏左侧（留空）
set -g status-left ""
set -g status-left-length 0

# 状态栏右侧：用户名@主机名 | uptime | 会话名
set -g status-right-length 100
set -g status-right " \
#[fg=#ffffff,bg=#000000]#(whoami)@#(hostname -s) | \
#[fg=#00ff00]#(uptime -p | sed 's/^up //' | sed 's/, *$//') \
#[fg=#000000,bg=#00ffff,bold] #S \
"
